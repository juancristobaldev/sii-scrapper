<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      font-size: 13px;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header span { font-size: 11px; color: #94a3b8; }
    .content { padding: 16px; }
    .status-card {
      padding: 12px;
      background: #1e293b;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status-card h3 { font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-card .value { font-size: 18px; font-weight: 700; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    .btn {
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary { background: #1a56db; color: white; }
    .btn-primary:hover:not(:disabled) { background: #1e40af; }
    .btn-green { background: #059669; color: white; }
    .btn-green:hover { background: #047857; }
    .btn-accent { background: #7c3aed; color: white; }
    .btn-accent:hover:not(:disabled) { background: #6d28d9; }
    .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #334155; }
    .btn-outline:hover { background: #1e293b; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #1e293b;
      font-size: 10px;
      color: #64748b;
      text-align: center;
    }
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .metric {
      padding: 10px;
      background: #1e293b;
      border-radius: 6px;
      text-align: center;
    }
    .metric .number { font-size: 20px; font-weight: 700; }
    .metric .label { font-size: 10px; color: #94a3b8; margin-top: 2px; }
    .sync-row {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 10px;
      color: #64748b;
    }
    .spinner {
      display: none;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px;">&#9888;</span>
    <div>
      <h1>SII Scrapper</h1>
      <span>v1.0 - Diagnostico Tributario</span>
    </div>
  </div>
  <div class="content">
    <div class="metrics">
      <div class="metric">
        <div class="number" id="count-docs">0</div>
        <div class="label">Documentos</div>
      </div>
      <div class="metric">
        <div class="number" id="count-findings">--</div>
        <div class="label">Hallazgos</div>
      </div>
    </div>
    <div class="sync-row" id="last-sync-row">
      <span>Ultima sincronizacion:</span>
      <span id="last-sync" style="color:#f8fafc;font-weight:500;">--</span>
    </div>
    <div class="status-card">
      <h3>ESTADO</h3>
      <div class="value" id="status-text" style="font-size:13px;color:#94a3b8;">
        Navega al SII y haz login para sincronizar.
      </div>
    </div>
    <div class="actions">
      <button id="btn-sync" class="btn btn-accent">
        <span class="spinner" id="sync-spinner"></span>
        <span id="sync-label">Sincronizar Ahora</span>
      </button>
      <button id="open-dashboard" class="btn btn-green">&#128640; Abrir Dashboard</button>
      <button id="open-sii" class="btn btn-outline">&#128279; Ir al SII</button>
    </div>
  </div>
  <div class="footer">
    SII Scrapper - Datos procesados localmente
  </div>

  <script src="popup.js"></script>
</body>
</html>
